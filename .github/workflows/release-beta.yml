name: Release Beta

on:
  push:
    tags:
      - "v*-beta"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Read app version
        id: version
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          text = Path("app/version_info.py").read_text(encoding="utf-8")
          match = re.search(r'APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("APP_VERSION not found in app/version_info.py")

          version = match.group(1).strip()
          display_version = version[:-5] if version.endswith("-beta") else version
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              print(f"app_version={version}", file=fh)
              print(f"display_version={display_version}", file=fh)
              print(f"tag=v{version}", file=fh)

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ steps.version.outputs.tag }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version tag ${{ steps.version.outputs.tag }}"
            exit 1
          fi

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt pyinstaller

      - name: Build app
        run: pyinstaller --clean --noconfirm AuditOS.spec

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/AuditOS.app "AuditOS_macOS_Beta_${{ steps.version.outputs.app_version }}.zip"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/AuditOS\*" -DestinationPath "AuditOS_Windows_Beta_${{ steps.version.outputs.app_version }}.zip" -Force

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: AuditOS_macOS_Beta_${{ steps.version.outputs.app_version }}.zip
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: AuditOS_Windows_Beta_${{ steps.version.outputs.app_version }}.zip
          if-no-files-found: error

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Read app version
        id: version
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          text = Path("app/version_info.py").read_text(encoding="utf-8")
          match = re.search(r'APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("APP_VERSION not found in app/version_info.py")

          version = match.group(1).strip()
          display_version = version[:-5] if version.endswith("-beta") else version
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              print(f"app_version={version}", file=fh)
              print(f"display_version={display_version}", file=fh)
              print(f"tag=v{version}", file=fh)

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create combined bundle
        run: |
          python scripts/build_combined_bundle.py \
            --version "${{ steps.version.outputs.tag }}" \
            --mac-zip "release-assets/AuditOS_macOS_Beta_${{ steps.version.outputs.app_version }}.zip" \
            --windows-zip "release-assets/AuditOS_Windows_Beta_${{ steps.version.outputs.app_version }}.zip" \
            --output "release-assets/AuditOS_CrossPlatform_Bundle_${{ steps.version.outputs.tag }}.zip"

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AuditOS Beta v${{ steps.version.outputs.display_version }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/AuditOS_macOS_Beta_${{ steps.version.outputs.app_version }}.zip
            release-assets/AuditOS_Windows_Beta_${{ steps.version.outputs.app_version }}.zip
            release-assets/AuditOS_CrossPlatform_Bundle_${{ steps.version.outputs.tag }}.zip
